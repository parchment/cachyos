[buildPlans.IosevkaVixelated]
family = "Iosevka Vixelated"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.IosevkaVixelated.variants]
inherits = "ss14"

[buildPlans.IosevkaVixelated.variants.design]
one = "no-base"
four = "closed-non-crossing-serifless"
five = "upright-flat-hook-serifless"
seven = "straight-serifless"
eight = "two-circles"
nine = "open-contour"
capital-g = "toothless-corner-serifless-hookless"
capital-i = "short-serifed"
capital-q = "horizontal-tailed"
a = "double-storey-serifless"
b = "toothed-serifless"
d = "toothed-serifless"
f = "flat-hook-serifless-crossbar-at-half-ascender-height"
g = "single-storey-serifless"
i = "hooky"
j = "flat-hook-serifless"
l = "hooky"
m = "serifless"
n = "straight-serifless"
p = "eared-serifless"
q = "top-cut-straight-serifless"
r = "hookless-serifless"
t = "flat-hook"
u = "toothed-serifless"
v = "straight-serifless"
w = "rounded-vertical-sides-almost-flat-top-serifless"
x = "straight-serifless"
y = "straight-serifless"
z = "straight-serifless"
paren = "normal"
brace = "straight"
ampersand = "lower-open"
dollar = "slanted-open"
cent = "slanted-open"
decorative-angle-brackets = "middle"

[buildPlans.IosevkaVixelated.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IosevkaVixelated.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.IosevkaVixelated.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.IosevkaVixelated.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.IosevkaVixelated.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaVixelated.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
