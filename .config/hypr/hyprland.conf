# ~/.config/hypr/hyprland.conf

# ─── Monitors ────────────────────────────────────────────────────────────────
monitor = eDP-1, 1920x1080@60, 0x0, 1
monitor = HDMI-A-1, preferred, 1920x0, 1
monitor = ,preferred,auto,1

# ─── Environment Variables ───────────────────────────────────────────────────
# Wayland-native rendering
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Firefox
env = MOZ_ENABLE_WAYLAND,1

# Electron apps
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# Cursor
env = XCURSOR_THEME,phinger-cursors-light
env = XCURSOR_SIZE,24

# ─── Startup ─────────────────────────────────────────────────────────────────
# Keyring must be first — apps launched afterward expect the socket
exec-once = gnome-keyring-daemon --start --components=secrets,ssh,pkcs11

exec-once = quickshell
exec-once = mako
exec-once = hypridle
exec-once = wl-paste --watch cliphist store

# Pipewire via systemd user services is preferred.
# If not using systemd user services, uncomment these:
# exec-once = pipewire &
# exec-once = pipewire-pulse &
# exec-once = wireplumber &

# ─── General ─────────────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(ffd866)
    col.inactive_border = rgb(000000)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 10
}

# ─── Decoration ──────────────────────────────────────────────────────────────
decoration {
    rounding = 4
    blur {
        enabled = false
    }
}

# ─── Animations ──────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, default, slide
    animation = windowsOut, 1, 4, default, slide
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, default
}

# ─── Input ───────────────────────────────────────────────────────────────────
input {
    kb_layout= gb
    touchpad {
        natural_scroll = true
        tap-to-click = true
        tap-and-drag = true
        clickfinger_behavior = true
        scroll_factor = 1.0
    }
}

# ─── Keybinds: Workspace Navigation ─────────────────────────────────────────
bind = SUPER, left,  workspace, e-1
bind = SUPER, right, workspace, e+1
bind = SUPER, H,     workspace, e-1
bind = SUPER, L,     workspace, e+1

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# ─── Keybinds: Window Navigation ────────────────────────────────────────────
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, l, movewindow, r
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, j, movewindow, d

bind  = SUPER, F, togglefloating
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, M,       fullscreen, 1
bind = SUPER SHIFT, M, fullscreen, 0
bind = SUPER, Q, killactive

# ─── Keybinds: Applications ─────────────────────────────────────────────────
bind = SUPER, A, exec, ghostty
bind = SUPER, B,      exec, firefox
bind = SUPER, Y,      exec, ghostty -e yazi
bind = SUPER, T,      exec, ghostty -e bluetuith
bind = SUPER, E,      exec, ghostty -e helix ~/Documents
bind = SUPER, K,      exec, ghostty -e lazydocker

# ─── Show desktop ────────────────────────────────────────────────────────────
bind = SUPER, D, exec, hyprctl keyword decoration:active_opacity 0 && hyprctl keyword decoration:inactive_opacity 0
bind = SUPER, D, submap, desktop

submap = desktop
bind = , escape, exec, hyprctl keyword decoration:active_opacity 1 && hyprctl keyword decoration:inactive_opacity 1
bind = , escape, submap, reset
bind = SUPER, D, exec, hyprctl keyword decoration:active_opacity 1 && hyprctl keyword decoration:inactive_opacity 1
bind = SUPER, D, submap, reset
bind = , catchall, submap, desktop
submap = reset

# ─── Keybinds: Session ──────────────────────────────────────────────────────
bind = SUPER SHIFT, L, exec, hyprlock
bind = SUPER SHIFT, S, exec, systemctl suspend
bind = SUPER SHIFT, E, exec, hyprctl dispatch exit

# ─── Keybinds: Media & Function Keys ────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = , Print,      exec, grimblast copy area
bind = SUPER, Print, exec, grimblast copy screen
